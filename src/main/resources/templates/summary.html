<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
<header th:replace="~{fragments/header :: ShopHeader}"></header>


<div class="main-content">

    <tr th:each="cartItem, itemStat : ${cart.cartItems}">
        <td th:text="${itemStat.count}">1</td>
        <td>
            <img th:src="@{${cartItem.item.imgURL}}">
        </td>
        <td th:text="${cartItem.item.name}"></td>
        <td style="display: flex; padding-top: 10px">
            <a th:href="@{'/order/cart/decrease/' + ${cartItem.item.id}}" class="mbtn" href="">-</a>
            <p th:text="${cartItem.counter}"></p>
            <a th:href="@{'/order/cart/increase/' + ${cartItem.item.id}}" class="mbtn" href="">+</a>
        </td>
        <td th:text="${cartItem.combinedPrice()}"></td>
        <td>
            <a th:href="@{'/order/cart/remove/' + ${cartItem.item.id}}" class="mbtn" href="">X</a>
        </td>
    </tr>
    </table>

    <div class="summary">
        <p><span>Do zapłaty </span><span th:text="${cart.price()}">0</span><span> zł</span></p>
    </div>

    <div class="summary">

        <form th:action="@{/order/saveorder}" method="post">
            <label>Imię</label>
            <input type="text" name="firstName" required>
            <label>Nazwisko</label>
            <input type="text" name="lastName" required>
            <label>Address</label>
            <input type="text" name="address" required>
            <label>kod pocztowy</label>
            <input type="text" name="postCode" required>
            <label>Miasto</label>
            <input type="text" name="city" required>
            <button type="submit" class="add-btn">Zamów</button>
        </form>

    </div>


</div>

</body>
</html>
