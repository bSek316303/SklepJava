<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
<header th:fragment="ShopHeader">
    <span class="title">MyShop</span>

    <div class="cart-ico">
        <span>Koszyk</span>
        <span th:text="${cart.counter}">0</span>
        <span>(</span>
        <span th:text="${cart.sum}">0</span>
        <span>)</span>
        <span>zł</span>
    </div>
</header>
</body>
</html>
