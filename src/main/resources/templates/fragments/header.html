<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
<header th:fragment="ShopHeader">
    <span class="title">MyShop</span>
    <a th:href="@{/order/cart}" class="cart-ico">
        <div>
            <span>Koszyk</span>
            <span th:text="${cart.size()}">0</span>
            <span>(</span>
            <span th:text="${cart.price()}">0</span>
            <span>)</span>
            <span>zł</span>
        </div>
    </a>
</header>
</body>
</html>
